name: Release

on:
  push:
    tags:
      # Stable SemVer: v0.1.0, v1.2.3.
      - "v[0-9]+.[0-9]+.[0-9]+"
      # Pre-release SemVer: v0.2.0-beta.1, v1.0.0-rc.2, etc. The
      # release job inspects the tag and flips prerelease=true on
      # the GitHub Release when a hyphen is present, so these show
      # up with the "Pre-release" label and don't displace the
      # "Latest release" pointer.
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # On-demand build for any branch — produces the same per-platform
  # artifact set as a tag-triggered run, but the `release` job is
  # gated off (see `if: github.event_name == 'push'` there) so no
  # GitHub Release lands. Artifacts live for 90 days on the
  # workflow-run page; download via `gh run download <run-id>` or
  # the Actions UI. Useful for verifying a binary on real hardware
  # before tagging.
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Version string used for filenames + Cargo.toml patching,
          with no leading "v" (e.g. "0.2.0-dev1"). A hyphen in the
          value is treated as a pre-release marker the same way a
          tag would be.
        required: true
        default: '0.0.0-dev'

# No workflow-level `permissions:` — each job declares its own so
# the `contents: write` needed to publish the release is scoped to
# the one job that actually creates it. Build jobs and the ci call
# only read the repo.

# Workflow-level effective version. Resolves to the dispatch input
# when present, otherwise the ref name (tag for push triggers).
# Steps that need a version read `$EFFECTIVE_VERSION` /
# `$env:EFFECTIVE_VERSION` / `env.EFFECTIVE_VERSION` so the dispatch
# path falls through correctly without per-step plumbing.
env:
  EFFECTIVE_VERSION: ${{ github.event.inputs.version || github.ref_name }}

# Queue, don't cancel: a mid-flight release shouldn't be interrupted
# by a retag of the same version — risk of half-uploaded artifacts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    # Reusable workflow; ci.yml declares its own `contents: read`.
    uses: ./.github/workflows/ci.yml

  # Single macOS build job that cross-compiles BOTH arm64 and x86_64
  # binaries on the Apple Silicon runner. gpui's native deps (ring,
  # psm) and rusb's vendored libusb all cross-compile cleanly between
  # the two Apple targets — cc-rs reads CARGO_BUILD_TARGET and picks
  # the right cross-compiler from clang's universal macOS toolchain.
  build-macos:
    needs: [ci]
    permissions:
      contents: read
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust (stable + both Apple targets)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # `shared-key: release` makes successive release-tag runs share
      # the release-mode `target/` cache across tags — v0.2.0 inherits
      # v0.1.0's compiled object files for the same Cargo.lock hash,
      # dropping the cold compile to minutes. Cross-compile puts each
      # arch's output under its own `target/<triple>/release` subdir
      # so the single cache covers both. CI uses the default (no
      # shared-key) so its debug-mode cache stays separate.
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release
          cache-on-failure: true

      - name: Install macOS build deps
        run: brew install pkg-config

      - name: Install cargo-packager
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-packager

      - name: Patch version
        run: |
          VERSION="${EFFECTIVE_VERSION#v}"
          # Awk over sed: BSD sed's `1,/.../{s/.../}` block syntax
          # bombs on macOS while GNU sed accepts it. Awk handles the
          # in-[package]-section scoping portably across BSD/macOS
          # and GNU/Linux.
          awk -v v="$VERSION" '
            /^\[/ { in_pkg = ($0 == "[package]") }
            in_pkg && /^version = / && !done { print "version = \"" v "\""; done=1; next }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          # Mirror to Info.plist so the .app bundle's marketing
          # version + build number reflect the tag rather than the
          # placeholder "0.0.1" sitting in the file.
          plutil -replace CFBundleShortVersionString -string "$VERSION" resources/Info.plist
          plutil -replace CFBundleVersion -string "$VERSION" resources/Info.plist
          echo "Building version: $VERSION"

      # Two cargo-packager invocations, one per target arch.
      # CARGO_BUILD_TARGET is the env-var form of cargo's --target
      # flag; setting it makes the inner `cargo build --release`
      # from `before-packaging-command` compile for the cross
      # target, and the --target flag on cargo-packager itself
      # points it at the matching target/<triple>/release/ for
      # the resulting binary. Both align under the same triple so
      # cargo-packager's binary-discovery agrees with the inner
      # build's output location.
      - name: Build arm64 .app + .dmg
        env:
          CARGO_BUILD_TARGET: aarch64-apple-darwin
        run: cargo packager --release -f app -f dmg --target aarch64-apple-darwin

      - name: Build amd64 .app + .dmg (cross-compile)
        env:
          CARGO_BUILD_TARGET: x86_64-apple-darwin
        run: cargo packager --release -f app -f dmg --target x86_64-apple-darwin

      - name: Stage artifacts
        run: |
          VERSION="${EFFECTIVE_VERSION#v}"
          mkdir -p release-artifacts
          # cargo-packager writes outputs to target/<triple>/release/
          # with names like etch341_0.2.0_aarch64.dmg. Loop both
          # arches, rename to the project's `arm64`/`amd64`
          # convention so the release page reads consistently.
          for pair in "aarch64-apple-darwin:arm64" "x86_64-apple-darwin:amd64"; do
            triple="${pair%%:*}"
            arch="${pair##*:}"
            bundle="target/${triple}/release"
            echo "--- contents of ${bundle} ---"
            ls -la "${bundle}" 2>/dev/null || true

            dmg=$(find "${bundle}" -maxdepth 1 -name 'etch341_*.dmg' | head -1)
            if [ -z "$dmg" ]; then
              echo "no .dmg produced for ${arch} at ${bundle}"
              exit 1
            fi
            mv "$dmg" "release-artifacts/etch341-${VERSION}-${arch}-macos.dmg"

            # Also ship a bare .app bundle in a zip for users who'd
            # rather skip the .dmg mount-and-drag. `ditto -c -k`
            # preserves the macOS extended attributes a plain
            # `zip -r` would strip — which would otherwise break
            # the ad-hoc codesign + Gatekeeper verification when
            # the user unzips the bundle.
            app="${bundle}/etch341.app"
            if [ -d "$app" ]; then
              ditto -c -k --sequesterRsrc --keepParent \
                "$app" \
                "release-artifacts/etch341-macOS-${arch}-${VERSION}.zip"
            else
              echo "no .app bundle at ${app}"; exit 1
            fi
          done
          echo "--- staged ---"
          ls -la release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-package
          path: release-artifacts/*

  build-linux:
    needs: [ci]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            triple: x86_64-unknown-linux-gnu
            rpm_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            triple: aarch64-unknown-linux-gnu
            rpm_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-${{ matrix.arch }}
          cache-on-failure: true

      # libusb is statically linked via rusb's vendored feature so
       # no libusb-1.0-0-dev here. xkbcommon / wayland / x11 / xcb /
       # fontconfig / freetype are gpui_linux's pkg-config deps.
       # file + libfuse2 are AppImage tooling deps — cargo-packager
       # invokes AppImageTool which needs fuse2 to mount the
       # squashfs image during packaging. ruby-dev + libarchive-tools
       # are for fpm (the .rpm + .pkg.tar.zst build steps below);
       # bsdtar from libarchive-tools is what fpm's pacman target
       # shells out to for the mtree pass.
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev libxcb1-dev libxcb-randr0-dev \
            libxcb-xkb-dev libxcb-cursor-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-render0-dev \
            libfontconfig1-dev libfreetype-dev \
            pkg-config \
            file libfuse2 \
            ruby-dev libarchive-tools

      - name: Install cargo-packager
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-packager

      # fpm packages a directory tree into any of .rpm / .pkg.tar.zst /
      # .deb / etc. We use it for the RPM-family + Arch outputs
      # because cargo-packager's pacman target writes a PKGBUILD +
      # source tarball intended for AUR submission, not the
      # directly-installable .pkg.tar.zst users expect from
      # `pacman -U`. fpm also gives us .rpm support that
      # cargo-packager itself doesn't expose.
      - name: Install fpm
        run: sudo gem install --no-document fpm

      - name: Patch version
        run: |
          VERSION="${EFFECTIVE_VERSION#v}"
          awk -v v="$VERSION" '
            /^\[/ { in_pkg = ($0 == "[package]") }
            in_pkg && /^version = / && !done { print "version = \"" v "\""; done=1; next }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          echo "Building version: $VERSION"

      - name: Build .deb + .AppImage
        env:
          CARGO_BUILD_TARGET: ${{ matrix.triple }}
        run: cargo packager --release -f deb -f appimage --target ${{ matrix.triple }}

      # Stage the install tree once; fpm rpm + pacman both consume
      # the same layout. Mirrors the same files cargo-packager's
      # .deb metadata drops, so the three packagers install the
      # binary, udev rule, .desktop entry, and icon at identical
      # paths.
      - name: Stage install tree for fpm
        run: |
          mkdir -p pkg/usr/bin
          cp "target/${{ matrix.triple }}/release/etch341" pkg/usr/bin/etch341
          chmod +x pkg/usr/bin/etch341

          mkdir -p pkg/usr/share/applications
          cp packaging/linux/etch341.desktop pkg/usr/share/applications/

          mkdir -p pkg/usr/lib/udev/rules.d
          cp platform/udev/99-ch341a.rules pkg/usr/lib/udev/rules.d/

          mkdir -p pkg/usr/share/icons/hicolor/512x512/apps
          cp resources/icons/icon.png pkg/usr/share/icons/hicolor/512x512/apps/etch341.png

      # Runtime libs matching the wayland+x11+font-kit surface
      # gpui_linux pulls in. The Cargo.toml deb metadata carries
      # the equivalent list for apt — keep these two lists in
      # lockstep when bumping.
      #
      # `()(64bit)` arch qualifier on every SONAME: RPM-based
      # distros (Fedora / openSUSE / RHEL / Mageia / …) auto-
      # generate library `Provides:` entries as
      # `libfoo.so.N()(64bit)` on 64-bit arches — both aarch64
      # and x86_64 use the same 64bit token. Without the suffix,
      # dnf / zypper see our bare `libfoo.so.N` Requires and
      # refuse to match against `libfoo.so.N()(64bit)` Provides,
      # surfacing as "nothing provides libX11.so.6" at install
      # time. Both arches we ship are 64-bit.
      - name: Build .rpm via fpm
        run: |
          VERSION="${EFFECTIVE_VERSION#v}"
          ARCH="${{ matrix.rpm_arch }}"
          fpm -s dir -t rpm -C pkg \
            --name etch341 --version "$VERSION" --architecture "$ARCH" \
            --license GPL-3.0-or-later \
            --description "Cross-platform CLI/GUI flash programmer for the CH341A USB SPI/I2C interface." \
            --url "https://github.com/packetThrower/etch341" \
            --vendor "packetThrower" --maintainer "packetThrower" \
            --depends 'libxkbcommon.so.0()(64bit)' \
            --depends 'libxkbcommon-x11.so.0()(64bit)' \
            --depends 'libwayland-client.so.0()(64bit)' \
            --depends 'libwayland-cursor.so.0()(64bit)' \
            --depends 'libX11.so.6()(64bit)' \
            --depends 'libxcb.so.1()(64bit)' \
            --depends 'libxcb-cursor.so.0()(64bit)' \
            --depends 'libxcb-randr.so.0()(64bit)' \
            --depends 'libxcb-render.so.0()(64bit)' \
            --depends 'libxcb-shape.so.0()(64bit)' \
            --depends 'libxcb-xfixes.so.0()(64bit)' \
            --depends 'libxcb-xkb.so.1()(64bit)' \
            --depends 'libfontconfig.so.1()(64bit)' \
            --depends 'libfreetype.so.6()(64bit)' \
            --package "etch341-${VERSION}-1.${ARCH}.rpm"

      # Pacman / Arch: same staging dir, fpm pacman target writes
      # the .pkg.tar.zst directly. Leaving --depends empty here
      # because the libudev / libxkbcommon package names on Arch
      # vary (`libxkbcommon` vs `libxkbcommon-x11`); empty depends
      # means pacman won't pre-resolve, but users with a desktop
      # already have these libs installed.
      - name: Build .pkg.tar.zst via fpm
        run: |
          VERSION="${EFFECTIVE_VERSION#v}"
          ARCH="${{ matrix.rpm_arch }}"
          fpm -s dir -t pacman -C pkg \
            --name etch341 --version "$VERSION" --architecture "$ARCH" \
            --license GPL-3.0-or-later \
            --description "Cross-platform CLI/GUI flash programmer for the CH341A USB SPI/I2C interface." \
            --url "https://github.com/packetThrower/etch341" \
            --vendor "packetThrower" --maintainer "packetThrower" \
            --package "etch341-${VERSION}-1-${ARCH}.pkg.tar.zst"

      - name: Stage artifact
        run: |
          VERSION="${EFFECTIVE_VERSION#v}"
          ARCH="${{ matrix.arch }}"
          RPM_ARCH="${{ matrix.rpm_arch }}"
          BUNDLE="target/${{ matrix.triple }}/release"
          mkdir -p release-artifacts

          echo "--- contents of ${BUNDLE} ---"
          ls -la "${BUNDLE}" 2>/dev/null || true

          # cargo-packager produces etch341_<version>_<arch>.deb and
          # etch341_<version>_<arch>.AppImage. Rename to the project's
          # consistent format-suffix convention.
          deb=$(find "${BUNDLE}" -maxdepth 1 -name 'etch341_*.deb' | head -1)
          if [ -z "$deb" ]; then
            echo "no .deb produced at ${BUNDLE}"; exit 1
          fi
          mv "$deb" "release-artifacts/etch341-${VERSION}-${ARCH}-linux.deb"

          appimage=$(find "${BUNDLE}" -maxdepth 1 -name 'etch341_*.AppImage' | head -1)
          if [ -z "$appimage" ]; then
            echo "no .AppImage produced at ${BUNDLE}"; exit 1
          fi
          mv "$appimage" "release-artifacts/etch341-${VERSION}-${ARCH}-linux.AppImage"

          # fpm writes the .rpm + .pkg.tar.zst to the current dir
          # (not target/release/). Pick them up by glob.
          rpm="etch341-${VERSION}-1.${RPM_ARCH}.rpm"
          if [ -f "$rpm" ]; then
            mv "$rpm" "release-artifacts/$rpm"
          else
            echo "no .rpm produced at $rpm"; exit 1
          fi

          pacman="etch341-${VERSION}-1-${RPM_ARCH}.pkg.tar.zst"
          if [ -f "$pacman" ]; then
            mv "$pacman" "release-artifacts/$pacman"
          else
            echo "no .pkg.tar.zst produced at $pacman"; exit 1
          fi

          echo "--- staged ---"
          ls -la release-artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-${{ matrix.arch }}-package
          path: release-artifacts/*

  build-windows:
    needs: [ci]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: amd64
            triple: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            arch: arm64
            triple: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-${{ matrix.arch }}
          cache-on-failure: true

      - name: Install cargo-packager
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-packager

      # cargo-wix replaces cargo-packager's `-f wix` MSI path. It
      # uses a system-installed WiX (installed in the next step)
      # rather than cargo-packager's vendored WiX 3.11 — that's
      # what made arm64 MSI builds impossible (candle.exe 3.11
      # predates `-arch arm64`, added in WiX 3.14). Only run on
      # stable tags because MSI's ProductVersion field rejects
      # alphanumeric prerelease identifiers like `0.3.0-beta.1`.
      - name: Install cargo-wix
        if: ${{ !contains(env.EFFECTIVE_VERSION, '-') }}
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-wix

      # WiX 3.14 (currently a pre-GA build under chocolatey's
      # `--pre` gate) is the minimum that carries `-arch arm64`.
      # choco's package sets the `WIX` env var and adds
      # `<install>\bin` to the system PATH, but the current
      # process's environment doesn't pick those up until we
      # re-read them — hence the path write to GITHUB_PATH so
      # the cargo-wix step below can find candle.exe / light.exe
      # without a full session reload.
      - name: Install WiX Toolset 3.14
        if: ${{ !contains(env.EFFECTIVE_VERSION, '-') }}
        shell: pwsh
        run: |
          choco install wixtoolset --pre -y --no-progress
          $wixDir = (Get-ChildItem 'C:\Program Files (x86)\WiX Toolset *' -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if ($wixDir) {
            "$wixDir\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
            "WIX=$wixDir\" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
            Write-Host "WiX installed at $wixDir"
          } else {
            Write-Error "WiX install directory not found after choco install"
            exit 1
          }

      # PowerShell because the runner is Windows. The shared awk
      # one-liner from the macOS/Linux jobs doesn't exist here, so
      # rebuild the version-patching in PS.
      - name: Patch version
        shell: pwsh
        run: |
          $version = $env:EFFECTIVE_VERSION -replace '^v', ''
          $content = Get-Content Cargo.toml
          $inPkg = $false
          $done = $false
          $out = foreach ($line in $content) {
            if ($line -match '^\[') { $inPkg = ($line -eq '[package]') }
            if ($inPkg -and -not $done -and $line -match '^version = ') {
              "version = `"$version`""
              $done = $true
            } else {
              $line
            }
          }
          $out | Set-Content Cargo.toml
          Write-Host "Building version: $version"

      - name: Build NSIS installer
        env:
          CARGO_BUILD_TARGET: ${{ matrix.triple }}
        run: cargo packager --release -f nsis --target ${{ matrix.triple }}

      # cargo-wix runs after cargo-packager so the etch341.exe
      # under target/${triple}/release/ already exists; --no-build
      # skips re-compiling. --nocapture surfaces candle.exe /
      # light.exe stderr inline rather than buffering it. Stable
      # tags only — pre-release identifiers like `0.3.0-beta.1`
      # break MSI's ProductVersion format.
      - name: Build .msi (cargo-wix, stable tags only)
        if: ${{ !contains(env.EFFECTIVE_VERSION, '-') }}
        shell: cmd
        run: cargo wix --no-build --nocapture --target ${{ matrix.triple }}

      - name: Stage artifacts
        shell: pwsh
        run: |
          $version = $env:EFFECTIVE_VERSION -replace '^v', ''
          $arch = "${{ matrix.arch }}"
          $bundle = "target/${{ matrix.triple }}/release"
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null

          Write-Host "--- contents of $bundle ---"
          Get-ChildItem -Path $bundle -File -Recurse | ForEach-Object { $_.FullName }

          # NSIS .exe ships from cargo-packager's output dir as
          # etch341_<version>_<arch>-setup.exe. Rename to the
          # project's `<arch>-windows-setup.exe` convention.
          $setup = Get-ChildItem "$bundle/*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $setup) {
            Write-Error "no NSIS installer produced at $bundle"
            exit 1
          }
          Move-Item $setup.FullName "release-artifacts/etch341-${version}-${arch}-windows-setup.exe"

          # MSI from cargo-wix lives under target/wix/. cargo-wix
          # uses kebab-case `etch341-<version>-<arch>.msi` by
          # default. Rename for consistency with the NSIS naming.
          # On pre-release tags this directory doesn't exist (the
          # cargo-wix step gated itself off) so the glob is just
          # a no-op in that case.
          $wixOut = "target/wix"
          if (Test-Path $wixOut) {
            Write-Host "--- contents of $wixOut ---"
            Get-ChildItem -Path $wixOut -File | ForEach-Object { $_.FullName }
            Get-ChildItem "$wixOut/*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
              $dest = "release-artifacts/etch341-${version}-${arch}-windows.msi"
              Move-Item $_.FullName -Destination $dest
              Write-Host "moved $($_.Name) -> $(Split-Path -Leaf $dest)"
            }
          }

          # Portable .zip of the bare etch341.exe for users who'd
          # rather skip the installer (and for CI/automation use).
          $portableStaging = "staging"
          New-Item -ItemType Directory -Force -Path $portableStaging | Out-Null
          Copy-Item "$bundle/etch341.exe" "$portableStaging/etch341.exe"
          Copy-Item LICENSE,README.md $portableStaging/
          Compress-Archive `
            -Path "$portableStaging/*" `
            -DestinationPath "release-artifacts/etch341-${version}-${arch}-windows.zip"

          Write-Host "--- staged ---"
          Get-ChildItem release-artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-${{ matrix.arch }}-package
          path: release-artifacts/*

  release:
    needs: [build-macos, build-windows, build-linux]
    # Skip the GitHub Release on workflow_dispatch — the build jobs
    # above produce the same artifact set either way, but the dispatch
    # flow is for ad-hoc testing on the workflow-run page, not for
    # shipping. Only the tag-push path lands a Release.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # The one job that needs write: it creates the GitHub Release and
    # uploads the artifacts. Everything upstream is read-only.
    permissions:
      contents: write
    steps:
      # Full history + tags so the release-notes step below can
      # resolve the previous tag and list commits between it and the
      # current tag. `persist-credentials: false` — the release job
      # only reads git locally; the GitHub Release is created through
      # the API token, not `git push`.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: "*-package"

      # Hash with bare basenames (not their subdir paths) so SHA256SUMS
      # lines match the filenames users see on the release page.
      - name: Generate SHA256SUMS
        run: |
          for dir in artifacts/*/; do
            (cd "$dir" && sha256sum ./*)
          done | sort > SHA256SUMS
          cat SHA256SUMS

      # Build a "What's Changed" body from the commit log between the
      # previous tag and this one. GitHub's generate_release_notes
      # only lists PR-merged commits, which misses direct-to-main
      # commits. Previous-tag logic branches on release type:
      #   - Pre-release (v*.*.*-*): walk to the most recent tag of
      #     any kind. Beta-to-beta deltas are easy to read.
      #   - Stable (v*.*.*): --exclude='*-*' skips pre-release tags
      #     so the final release's log spans the whole stable-to-
      #     stable window, not just the delta since the last beta.
      - name: Build release notes
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          if [[ "${CURRENT_TAG}" == *-* ]]; then
            IS_PRERELEASE=1
            PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)
          else
            IS_PRERELEASE=0
            PREV_TAG=$(git describe --tags --abbrev=0 --exclude='*-*' "${CURRENT_TAG}^" 2>/dev/null || true)
          fi

          {
            if [ "$IS_PRERELEASE" = "1" ]; then
              echo "> ⚠️ **Pre-release.** Published for testing. Behaviour and artifacts are not final."
              echo
            fi

            echo "> ℹ️ **Platform support.**"
            echo ">"
            echo "> macOS (arm64 + amd64) is the primary dev target and exercised against real CH341A hardware on every release."
            echo "> Windows + Linux are built but tested against hardware less often. Issues on any platform are welcome at <https://github.com/${GITHUB_REPOSITORY}/issues>."
            echo
            echo "## What's Changed"
            echo
            if [ -n "$PREV_TAG" ]; then
              git log --no-merges --format='* %s (%h)' "${PREV_TAG}..${CURRENT_TAG}"
              echo
              echo "**Full Changelog**: ${REPO_URL}/compare/${PREV_TAG}...${CURRENT_TAG}"
            else
              git log --no-merges --format='* %s (%h)' "${CURRENT_TAG}"
              echo
              echo "**Full Changelog**: ${REPO_URL}/commits/${CURRENT_TAG}"
            fi
          } > release-notes.md

          echo "--- Generated release notes ---"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/macos-package/*
            artifacts/windows-amd64-package/*
            artifacts/windows-arm64-package/*
            artifacts/linux-amd64-package/*
            artifacts/linux-arm64-package/*
            SHA256SUMS
          body_path: release-notes.md
          draft: false
          # Tags with a hyphen in the SemVer pre-release slot flag as
          # pre-release so GitHub shows the "Pre-release" badge and
          # leaves "Latest release" on the most recent stable.
          prerelease: ${{ contains(env.EFFECTIVE_VERSION, '-') }}
