# Chip database. Loaded at runtime by `chipdb.rs`.
#
# `jedec_id` is the 3-byte response to opcode 0x9F: manufacturer
# byte + 2-byte device ID, formatted as 6 uppercase hex chars
# with no separator (e.g. "EF4018").
#
# `erase_time_ms` is the *typical 4K sector erase* time from the
# datasheet, used for progress estimation during range erases.
# Full chip erase is orders of magnitude longer and is polled
# against SR1.WIP rather than estimated.
#
# Values here are best-effort from public datasheets — verify
# against the part you're actually programming.

# --- Winbond W25X (older 3.3V, manufacturer 0xEF, family 0x30) ----
# Predecessor to the W25Q line. Standard SPI NOR opcodes, smaller
# capacities. Still ships in legacy embedded gear and dev boards.

